security:
    password_hashers:
        App\Entity\Security\User:
            algorithm: auto


    providers:
        app_user_provider:
            entity:
                class: App\Entity\Security\User
                property: email
        # used to reload user from session & other features (e.g. switch_user)

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/v1/user/login
            stateless: true
            json_login:
                check_path: /api/v1/user/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

    access_control:
        - { path: ^/api/v1/user/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/user/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/(login|token/refresh), roles: PUBLIC_ACCESS }
        - { path: ^/api/v1,       roles: IS_AUTHENTICATED_FULLY }