nelmio_api_doc:
    documentation:
        info:
            title: Currency Exchange Platform API
            description: |
                This API allows users to exchange currencies in Cameroon.
                It provides features for publishing offers, searching for available exchanges,
                and securing transactions between users.
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
                    description: 'Enter JWT token in the format: Bearer {token}. Token includes company context for multi-tenant operations.'
        security:
            - Bearer: []